<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DchatS资源整合站</title>

    <!-- ========================================== -->
    <!-- 【配置区】绝对置顶：只改下面两行引号里的内容 -->
    <!-- ========================================== -->
    <script>
        // 1. 这里填整合包的跳转链接
        var jumpLink = "https://dchats.lanzouv.com/b011m9npve";

        // 2. 这里填中间显示的链接文本
        var copyText = "账号95475906:10123密码10123";
    </script>
    <!-- ========================================== -->

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1f2c;
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 顶部下载按钮 */
        .top-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; border: none; padding: 12px 30px; border-radius: 50px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); margin-bottom: 25px;
            transition: transform 0.2s; display: flex; align-items: center; gap: 8px;
            text-decoration: none; z-index: 10;
        }
        .top-btn:active { transform: scale(0.95); }
        .top-btn svg { width: 18px; height: 18px; fill: white; }
        
        /* 中间紫色框：自适应宽度，点击刷新 */
        .link-box-wrapper {
            width: auto; min-width: 85%; max-width: 90%; height: 60px; 
            background-color: #4b3b75; border-radius: 30px; 
            display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease; overflow: hidden;
            box-sizing: border-box; padding: 0 20px; cursor: pointer;
        }
        .link-box-wrapper:active { transform: scale(0.98); }

        .display-text {
            color: #e0d8ff; font-size: 18px; letter-spacing: 1px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center;
            user-select: text; /* 允许框选，解决重影 */
        }

        /* 复制按钮 */
        .copy-btn {
            margin-top: 25px; background-color: #2c3549; color: #aebbc9;
            border: 1px solid #3e4a61; padding: 10px 25px; border-radius: 50px;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background-color: #364259; color: white; }
        .copy-btn:active { transform: scale(0.95); }
        .copy-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* 白底圆角提示框 */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #ffffff; color: #333; padding: 16px 32px;
            border-radius: 12px; font-size: 15px; font-weight: 500;
            opacity: 0; pointer-events: none;
            transition: all 0.25s ease; z-index: 100;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* 桌面端适配 */
        @media (min-width: 768px) {
            .link-box-wrapper { min-width: 600px; max-width: 800px; height: 80px; }
            .display-text { font-size: 22px; }
            .top-btn { padding: 15px 40px; font-size: 18px; }
            .copy-btn { padding: 12px 30px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- 顶部下载按钮 -->
    <a href="#" class="top-btn" onclick="window.open(jumpLink, '_blank')">
        <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10H6v-2h8v2zm4-4H6v-2h12v2z"/></svg>
        整合包下载-密码123
    </a>

    <!-- 中间紫色框：点击刷新 -->
    <div class="link-box-wrapper" id="boxWrapper" onclick="location.reload()">
        <div class="display-text" id="displayText"></div>
    </div>

    <!-- 复制按钮：纯复制，不刷新 -->
    <button class="copy-btn" id="copyBtn">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        点击复制(先点紫框刷新再复制)
    </button>

    <!-- 白底提示框 -->
    <div class="toast" id="toast">复制成功</div>

    <script>
        // ==========================================
        // 1. 核心防缓存守卫（原封不动）
        // ==========================================
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('t')) {
                var currentUrl = window.location.href.split('?')[0];
                var newUrl = currentUrl + '?t=' + new Date().getTime();
                window.location.replace(newUrl);
            }
        })();

        // ==========================================
        // 2. 页面初始化 + 超长文本截断提示
        // ==========================================
        window.onload = function() {
            var displayEl = document.getElementById('displayText');
            displayEl.innerText = copyText;

            // 检测是否超出宽度，超出则追加提示
            setTimeout(function() {
                if (displayEl.scrollWidth > displayEl.clientWidth) {
                    displayEl.innerText = copyText + ' ...[超出长度已自动隐藏]';
                }
            }, 50);
        };

        // ==========================================
        // 3. 纯复制逻辑 + 失败自动框选（无重影）
        // ==========================================
        document.getElementById('copyBtn').addEventListener('click', function() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(copyText).then(function() {
                    showToast("复制成功");
                }).catch(function() {
                    fallbackSelect();
                });
            } else {
                fallbackSelect();
            }
        });

        // 失败兜底：自动高亮框选，不创建隐藏input，彻底杜绝重影
        function fallbackSelect() {
            var displayEl = document.getElementById('displayText');
            var range = document.createRange();
            range.selectNodeContents(displayEl);
            var selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            showToast("请手动长按或Ctrl+C复制");
        }

        // ==========================================
        // 4. 白底提示框
        // ==========================================
        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
