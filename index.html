<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DchatS资源整合站</title>

    <!-- ========================================== -->
    <!-- 【配置区】绝对置顶：只改下面两行引号里的内容 -->
    <!-- ========================================== -->
    <script>
        // 1. 这里填整合包的跳转链接
        var jumpLink = "https://dchats.lanzouv.com/b011m9npve";

        // 2. 这里填中间显示的链接文本
        var copyText = "2026.7.3-5";
    </script>
    <!-- ========================================== -->

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1f2c;
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .top-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; border: none; padding: 12px 30px; border-radius: 50px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); margin-bottom: 25px;
            transition: transform 0.2s; display: flex; align-items: center; gap: 8px;
            text-decoration: none; z-index: 10;
        }
        .top-btn:active { transform: scale(0.95); }
        .top-btn svg { width: 18px; height: 18px; fill: white; }
        
        /* 新增：给紫色框添加点击样式 */
        .link-box-wrapper {
            width: 85%; max-width: 600px; height: 60px; background-color: #4b3b75;
            border-radius: 30px; display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease; overflow: hidden;
            cursor: pointer; /* 鼠标移上去变成小手 */
        }
        .link-box-wrapper:active { transform: scale(0.98); } /* 点击时有轻微缩放反馈 */

        #realInput {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; background: transparent; border: none; outline: none;
            color: white; font-size: 18px; text-align: center; opacity: 0;
            cursor: default; padding: 0 20px; box-sizing: border-box; z-index: 2;
        }
        .display-text {
            color: #e0d8ff; font-size: 18px; letter-spacing: 1px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center;
            pointer-events: none; z-index: 1; padding: 0 20px; box-sizing: border-box;
        }
        .copy-btn {
            margin-top: 25px; background-color: #2c3549; color: #aebbc9;
            border: 1px solid #3e4a61; padding: 10px 25px; border-radius: 50px;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background-color: #364259; color: white; }
        .copy-btn:active { transform: scale(0.95); }
        .copy-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none;
            transition: all 0.3s; z-index: 100;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        @media (min-width: 768px) {
            .link-box-wrapper { max-width: 800px; height: 80px; }
            .display-text, #realInput { font-size: 22px; }
            .top-btn { padding: 15px 40px; font-size: 18px; }
            .copy-btn { padding: 12px 30px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <a href="#" class="top-btn" onclick="window.open(jumpLink, '_blank')">
        <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10H6v-2h8v2zm4-4H6v-2h12v2z"/></svg>
        整合包下载-密码123
    </a>

    <!-- 中间显示区域（已绑定点击强制刷新） -->
    <div class="link-box-wrapper" id="boxWrapper" onclick="forceRefresh()">
        <div class="display-text" id="displayText"></div>
        <input type="text" id="realInput" readonly>
    </div>

    <button class="copy-btn" onclick="refreshAndCopy()">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        先刷新再复制
    </button>

    <div class="toast" id="toast">复制成功</div>

    <script>
        // ==========================================
        // 1. 核心防缓存守卫：自动强制刷新
        // ==========================================
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('t')) {
                var currentUrl = window.location.href.split('?')[0];
                var newUrl = currentUrl + '?t=' + new Date().getTime();
                window.location.replace(newUrl);
            }
        })();

        // ==========================================
        // 2. 页面基础逻辑
        // ==========================================
        const displayText = document.getElementById('displayText');
        const realInput = document.getElementById('realInput');
        const boxWrapper = document.getElementById('boxWrapper');

        window.onload = function() {
            realInput.value = copyText;
            checkOverflow();
            window.addEventListener('resize', checkOverflow);
        };

        function checkOverflow() {
            displayText.style.textOverflow = 'clip';
            displayText.style.whiteSpace = 'nowrap';
            const textWidth = displayText.scrollWidth;
            const containerWidth = boxWrapper.clientWidth - 40;
            if (textWidth > containerWidth) {
                displayText.style.textOverflow = 'ellipsis';
                displayText.innerText = copyText;
            } else {
                displayText.style.textOverflow = 'clip';
                displayText.innerText = copyText;
            }
        }

        // ==========================================
        // 3. 新增：点击紫色框强制刷新
        // ==========================================
        function forceRefresh() {
            var timestamp = new Date().getTime();
            var currentUrl = window.location.href.split('?')[0];
            var newUrl = currentUrl + '?t=' + timestamp;
            window.location.href = newUrl;
        }

        // ==========================================
        // 4. 按钮逻辑：先刷新再复制
        // ==========================================
        function refreshAndCopy() {
            var timestamp = new Date().getTime();
            var currentUrl = window.location.href.split('?')[0];
            var newUrl = currentUrl + '?t=' + timestamp;
            sessionStorage.setItem('autoCopyText', copyText);
            window.location.href = newUrl;
        }

        window.addEventListener('load', function() {
            var textToCopy = sessionStorage.getItem('autoCopyText');
            if (textToCopy) {
                sessionStorage.removeItem('autoCopyText');
                setTimeout(function() {
                    navigator.clipboard.writeText(textToCopy).then(function() {
                        showToast("已获取最新内容并复制成功！");
                    }).catch(function() {
                        realInput.value = textToCopy;
                        realInput.style.opacity = '1';
                        realInput.style.background = 'rgba(255,255,255,0.1)';
                        realInput.removeAttribute('readonly');
                        realInput.select();
                        realInput.setSelectionRange(0, 99999);
                        showToast("已刷新，请手动长按复制");
                        document.body.addEventListener('click', function reset() {
                            realInput.style.opacity = '0';
                            realInput.style.background = 'transparent';
                            realInput.setAttribute('readonly', true);
                            document.body.removeEventListener('click', reset);
                        }, { once: true });
                    });
                }, 100);
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
